name: Release Windows Build

# Запускається при push тегу виду v1.2.3 або вручну з вкладки Actions
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write   # потрібно щоб tauri-action створив Release

    env:
      # Opt into Node.js 24 for JS-based actions (checkout, setup-node, upload-artifact).
      # Node.js 20 is deprecated on GitHub runners starting 2026-06-16.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          # Bump this prefix to invalidate the cache after dependency changes
          # (e.g. brotli / alloc-no-stdlib pinning).
          prefix-key: v2-brotli-fix
          cache-on-failure: false

      - name: Install npm dependencies
        run: npm ci

      - name: Generate Tauri icons from source PNG
        run: npx @tauri-apps/cli icon src-tauri/icons/source.png

      - name: Build Tauri app (MSI + NSIS) and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Raskladka Fix ${{ github.ref_name }}'
          releaseBody: |
            Windows-збірка Raskladka Fix.

            **Установка:** завантажте `.msi` (рекомендовано) або `.exe` (NSIS) нижче.
            При першому запуску Windows SmartScreen може попередити про «невідомого видавця» — це нормально для непідписаної збірки (More info → Run anyway).
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc

      - name: Upload artifacts (на випадок ручного запуску без тегу)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: raskladka-fix-windows
          path: |
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn